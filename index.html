
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=block" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=block" />
      <title>ResistAct — Join The Resistance</title>
      <meta name="description" content="Find small, doable actions to push back. Join the resistance at ResistAct." />

      <!-- Open Graph / Facebook
           Note: og:image is intentionally pointed at a NEW filename (og-image-v4.jpg)
           rather than overwriting the old og-image.jpg. Facebook caches OG images by
           URL — changing the URL is the single most reliable way to make every social
           platform re-scrape and pick up the new image. Bump the version (v3, v4, …)
           any time the social-share preview changes. -->
      <meta property="og:type"        content="website" />
      <meta property="og:url"         content="https://www.resistact.org/" />
      <meta property="og:title"       content="ResistAct — Join The Resistance" />
      <meta property="og:description" content="Never doubt that a small group of thoughtful, committed citizens can change the world. Find actions you can take today." />
      <meta property="og:image"       content="https://www.resistact.org/og-image-v4.jpg" />
      <meta property="og:image:width"  content="1500" />
      <meta property="og:image:height" content="1000" />

      <!-- Twitter / X -->
      <meta name="twitter:card"        content="summary_large_image" />
      <meta name="twitter:url"         content="https://www.resistact.org/" />
      <meta name="twitter:title"       content="ResistAct — Join The Resistance" />
      <meta name="twitter:description" content="Never doubt that a small group of thoughtful, committed citizens can change the world. Find actions you can take today." />
      <meta name="twitter:image"       content="https://www.resistact.org/og-image-v4.jpg" />
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
